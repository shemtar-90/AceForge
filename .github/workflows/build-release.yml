name: Build and Release ACEForge

# Triggers:
#   - Push a tag like v1.0.0  → builds and publishes a GitHub Release
#   - Manual trigger          → builds but does not publish (for testing)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish as a release?'
        required: false
        default: 'false'

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      # ── 1. Checkout source ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 4. Prepare reference files ───────────────────────────────────────
      # Reference files must be committed to aceforge/references/ for AI
      # Mode to work. Manual Mode always works without them.
      # The folder is always created so PyInstaller never crashes on it.
      - name: Prepare reference files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "aceforge/references" | Out-Null

          $refs = @(
            "aceforge/references/enums.md",
            "aceforge/references/spells.md",
            "aceforge/references/all_spells.txt",
            "aceforge/references/did_values.md",
            "aceforge/references/icons.md",
            "aceforge/references/armor.md",
            "aceforge/references/clothing.md",
            "aceforge/references/melee_weapons.md",
            "aceforge/references/missile_weapons.md",
            "aceforge/references/casters.md",
            "aceforge/references/quests.md",
            "aceforge/references/lore.md",
            "aceforge/references/schema.md"
          )

          $missing = @()
          $present = @()
          foreach ($f in $refs) {
            if (Test-Path $f) { $present += $f } else { $missing += $f }
          }

          Write-Host "Reference files present: $($present.Count)"
          Write-Host "Reference files missing: $($missing.Count)"

          if ($missing.Count -gt 0) {
            Write-Warning "Missing files (AI Mode limited) — commit them from ace-content-generator.skill:"
            foreach ($f in $missing) { Write-Warning "  $f" }

            $txt = "To enable full AI Mode, add the reference files from ace-content-generator.skill`ninto aceforge/references/ and push a new release.`n`nMissing:`n" + ($missing -join "`n")
            Set-Content -Path "aceforge/references/README_AI_MODE.txt" -Value $txt
          } else {
            Write-Host "All reference files present."
          }

      # ── 5. Build with PyInstaller ────────────────────────────────────────
      - name: Build executable
        run: pyinstaller ACEForge.spec --noconfirm --clean

      # ── 6. Verify the build output ───────────────────────────────────────
      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/ACEForge/ACEForge.exe")) {
            Write-Error "Build failed — ACEForge.exe not found in dist/ACEForge/"
            exit 1
          }
          $size = (Get-Item "dist/ACEForge/ACEForge.exe").Length / 1MB
          Write-Host "ACEForge.exe built successfully ($([math]::Round($size, 1)) MB)"

      # ── 7. Get version from tag or run number ────────────────────────────
      - name: Get version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = "dev-${{ github.run_number }}"
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "ZIP_NAME=ACEForge_${version}_Windows.zip" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $version"

      # ── 8. Write version file and copy README into build ─────────────────
      - name: Finalize build folder
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          Set-Content -Path "dist/ACEForge/VERSION.txt" -Value "ACEForge v$version`nBuilt: $(Get-Date -Format 'yyyy-MM-dd HH:mm UTC')`nPlatform: Windows x64"
          Copy-Item "README.md" -Destination "dist/ACEForge/README.md"

      # ── 9. Zip the build output ──────────────────────────────────────────
      - name: Create release zip
        shell: pwsh
        run: |
          $zipName = "${{ steps.version.outputs.ZIP_NAME }}"
          Compress-Archive -Path "dist/ACEForge/*" -DestinationPath $zipName
          $size = (Get-Item $zipName).Length / 1MB
          Write-Host "Created $zipName ($([math]::Round($size, 1)) MB)"

      # ── 10. Upload as workflow artifact (always available) ───────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACEForge-Windows
          path: ${{ steps.version.outputs.ZIP_NAME }}
          retention-days: 30

      # ── 11. Create GitHub Release (tag pushes only) ──────────────────────
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ACEForge ${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.version.outputs.ZIP_NAME }}
          body: |
            ## ACEForge ${{ steps.version.outputs.VERSION }}

            ### How to install

            1. Download **`${{ steps.version.outputs.ZIP_NAME }}`** below
            2. Extract the zip anywhere — e.g. `C:\ACEForge\`
            3. Double-click **`ACEForge.exe`**
            4. Open **Settings** to enter your server name and WCID ranges
            5. **Manual Mode** works immediately — no API key needed
            6. For **AI Mode**, add your [Anthropic API key](https://console.anthropic.com) in Settings

            ### Requirements

            - Windows 10 or 11 (64-bit)
            - No Python installation needed — everything is bundled

            ### Features

            - ✏ **Manual Mode** — Full weenie editor with 14 property tabs, no internet required
            - ✨ **AI Mode** — Claude-powered SQL generation (requires Anthropic API key)
            - Multi-weenie sessions with JSON save/load
            - Live SQL preview as you edit
            - Configurable WCID ranges for any ACEmulator server

            ### Your settings are preserved on upgrade

            Reinstalling does not touch `%APPDATA%\ACEForge\config.json` —
            your API key, server name, and WCID ranges carry over automatically.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
